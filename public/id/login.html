<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentral Plastik | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body class="bg-gradient-to-br from-orange-400 to-orange-600 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden animate-fade-in-up">
  <div class="relative h-32 bg-gradient-to-r from-orange-500 to-orange-600">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23F97316'/%3E%3Ctext x='50' y='67' font-size='48' text-anchor='middle' fill='%23FFFFFF' font-family='Arial' font-weight='bold'%3ESP%3C/text%3E%3C/svg%3E" class="absolute -bottom-10 left-1/2 transform -translate-x-1/2 w-20 h-20 rounded-full border-4 border-white shadow-lg" alt="logo">
  </div>
  <div class="pt-12 px-6 pb-8">
    <h1 class="text-2xl font-extrabold text-center text-gray-800">Sentral Plastik</h1>
    <p class="text-center text-gray-500 text-sm mt-1">Toko Plastik Terpercaya</p>

    <div class="flex border-b mt-6 mb-6">
      <button id="tabAdminLogin" class="flex-1 py-2 text-center font-semibold text-gray-600 border-b-2 border-transparent hover:text-orange-500 transition">Admin</button>
      <button id="tabUserLogin" class="flex-1 py-2 text-center font-semibold text-gray-600 border-b-2 border-transparent hover:text-orange-500 transition active">User</button>
    </div>

    <div id="adminLoginForm" class="hidden space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="adminUsername" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-orange-500 focus:border-orange-500" placeholder="Masukkan username...">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="adminPassword" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-orange-500 focus:border-orange-500" placeholder="Masukkan password...">
      </div>
      <button id="adminLoginBtn" class="w-full bg-orange-500 text-black py-2 rounded-xl font-semibold hover:bg-orange-600 transition">Login</button>
    </div>

    <div id="userLoginForm" class="text-center space-y-4">
      <p class="text-gray-600">Login dengan akun Google Anda</p>
      <a href="/auth/google" class="inline-flex items-center justify-center gap-3 bg-white border border-gray-300 rounded-xl px-6 py-3 shadow-sm hover:shadow-md transition w-full">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="google">
        <span class="font-medium text-gray-700">Login dengan Google</span>
      </a>
    </div>

    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-orange-500 hover:underline">← Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
